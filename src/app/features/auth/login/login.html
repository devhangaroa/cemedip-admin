<app-auth-shell
  imageSrc="assets/login_admin.png"
  imageAlt="Doctora CEMEDIP"
  imagePosition="left"
  contentWidth="md"
>
  <div class="mb-16 flex scale-110 justify-center lg:scale-125">
    <app-logo />
  </div>

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-10">
    @if (errorMessage()) {
      <div class="app-feedback-message app-feedback-message-danger mb-4">
        <p class="text-sm">{{ errorMessage() }}</p>
      </div>
    }

    <app-form-field inputId="username" label="Usuario">
      <input
        pInputText
        id="username"
        name="username"
        type="text"
        autocomplete="username"
        formControlName="username"
        placeholder="Ingrese usuario"
      />
      @if (username.touched && username.invalid) {
        <small class="app-form-error">El usuario es obligatorio</small>
      }
    </app-form-field>

    <app-form-field inputId="password" label="Contraseña">
      <p-password
        inputId="password"
        name="password"
        autocomplete="current-password"
        formControlName="password"
        placeholder="Ingrese contraseña"
        [toggleMask]="true"
        [feedback]="false"
        fluid
      />
      @if (password.touched && password.invalid) {
        <small class="app-form-error">La contraseña es obligatoria</small>
      }

    </app-form-field>

    <div class="mt-6 flex justify-center">
      <p-button
        type="submit"
        label="INGRESAR"
        [disabled]="loginForm.invalid || isLoading()"
        [loading]="isLoading()"
        [pt]="{ root: { class: 'h-14 w-56' } }"
      />
    </div>
  </form>
</app-auth-shell>
