<p-dialog
  header="Cambiar contraseña"
  [visible]="visible"
  (visibleChange)="cerrar()"
  [modal]="true"
  [closable]="!loading"
  [resizable]="false"
  [style]="{ width: '420px' }"
>
  <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-4 pt-1">

    <div class="flex flex-col gap-1">
      <label for="cp_nueva" class="text-xs font-semibold tracking-wide text-surface-500">
        NUEVA CONTRASEÑA
      </label>
      <input
        id="cp_nueva"
        pInputText
        type="password"
        formControlName="nueva_contrasena"
        placeholder="Nueva contraseña"
        autocomplete="new-password"
      />
    </div>

    <div class="flex flex-col gap-1">
      <label for="cp_confirmar" class="text-xs font-semibold tracking-wide text-surface-500">
        CONFIRMAR CONTRASEÑA
      </label>
      <input
        id="cp_confirmar"
        pInputText
        type="password"
        formControlName="confirmar_contrasena"
        placeholder="Repite la contraseña"
        autocomplete="new-password"
        [class.border-red-400]="noCoinciden"
      />
      @if (noCoinciden) {
        <span class="text-xs text-red-500">Las contraseñas no coinciden.</span>
      }
    </div>

    <div class="flex justify-end gap-3 pt-2 border-t border-surface-100">
      <p-button
        type="button"
        label="Cancelar"
        severity="secondary"
        [disabled]="loading"
        (click)="cerrar()"
      />
      <p-button
        type="submit"
        label="Guardar"
        [disabled]="form.invalid"
        [loading]="loading"
      />
    </div>

  </form>
</p-dialog>
